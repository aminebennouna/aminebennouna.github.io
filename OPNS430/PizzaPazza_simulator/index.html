<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pizza Pazza — Process Simulator</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, system-ui, BlinkMacSystemFont, sans-serif; background: #fff; color: #111; }
  input[type="range"] { accent-color: #2563EB; }
  button { cursor: pointer; }
  button:hover { filter: brightness(1.1); }
</style>
</head>
<body>
<div id="app" style="max-width:840px;margin:0 auto;padding:20px"></div>
<script>
/* ═══════════════════════ DATA ═══════════════════════ */
const COLORS = ["#2563EB","#059669","#D97706","#7C3AED","#DC2626"];
const STEP_LABELS = ["Sauce","Dough","Spread","Load","Bake","Cool","Pack","Bill"];
const STEP_RES   = ["Jean","Jean","Jean","Jacqu.","Oven","Rack","Jacqu.","Jacqu."];
const STEP_DUR   = [2, 3, 2, 1, 15, 3, 2, 2];

/* ── Natural Flow (pipelined) schedule ── */
const SCHED_FLOW = [
  [[0,2],[2,5],[5,7],[7,8],[8,23],[23,26],[26,28],[28,30]],
  [[7,9],[9,12],[12,14],[23,24],[24,39],[39,42],[42,44],[44,46]],
  [[14,16],[16,19],[19,21],[39,40],[40,55],[55,58],[58,60],[60,62]],
  [[21,23],[23,26],[26,28],[55,56],[56,71],[71,74],[74,76],[76,78]],
  [[28,30],[30,33],[33,35],[71,72],[72,87],[87,90],[90,92],[92,94]],
];
const DONE_FLOW = [30,46,62,78,94];

/* ── Sequential (one-by-one) schedule ── */
const SCHED_SEQ = [];
const DONE_SEQ = [];
for (let i = 0; i < 5; i++) {
  const base = i * 30;
  const order = [];
  let t = base;
  for (let s = 0; s < 8; s++) {
    order.push([t, t + STEP_DUR[s]]);
    t += STEP_DUR[s];
  }
  SCHED_SEQ.push(order);
  DONE_SEQ.push(t);
}

/* ── Mode config ── */
const MODES = {
  seq:  { label: "One-by-One", sched: SCHED_SEQ, done: DONE_SEQ, max: 152 },
  flow: { label: "Natural Flow", sched: SCHED_FLOW, done: DONE_FLOW, max: 96 },
};

/* ── Gantt blocks builder ── */
function buildGantt(sched) {
  const RES_STEPS = { Jean: [0,1,2], Jacqueline: [3,6,7], Oven: [4], Rack: [5] };
  const gantt = {};
  for (const res of ["Jean","Jacqueline","Oven","Rack"]) {
    gantt[res] = [];
    for (let oi = 0; oi < sched.length; oi++) {
      for (const si of RES_STEPS[res]) {
        gantt[res].push({ o: oi, s: sched[oi][si][0], e: sched[oi][si][1] });
      }
    }
    gantt[res].sort((a, b) => a.s - b.s);
  }
  return gantt;
}

function calcUtil(sched, done) {
  const totalTime = done[done.length - 1];
  const work = { Jean: 0, Jacqueline: 0, Oven: 0, Rack: 0 };
  const RES_STEPS = { Jean: [0,1,2], Jacqueline: [3,6,7], Oven: [4], Rack: [5] };
  for (const res in RES_STEPS) {
    for (let oi = 0; oi < sched.length; oi++) {
      for (const si of RES_STEPS[res]) {
        work[res] += sched[oi][si][1] - sched[oi][si][0];
      }
    }
  }
  const util = {};
  for (const res in work) util[res] = Math.round(work[res] / totalTime * 100);
  return util;
}

const GANTT_FLOW = buildGantt(SCHED_FLOW);
const GANTT_SEQ  = buildGantt(SCHED_SEQ);
const UTIL_FLOW  = calcUtil(SCHED_FLOW, DONE_FLOW);
const UTIL_SEQ   = calcUtil(SCHED_SEQ, DONE_SEQ);
const RES_NAMES  = ["Jean","Jacqueline","Oven","Rack"];

/* ═══════════════════ STATE ═══════════════════ */
let mode = "seq";
let time = 0, playing = false, speed = 1, showFull = false;
let rafId = null, prevStamp = null;

function M() { return MODES[mode]; }
function SCHED() { return M().sched; }
function DONE()  { return M().done; }
function GANTT() { return mode === "flow" ? GANTT_FLOW : GANTT_SEQ; }
function UTIL()  { return mode === "flow" ? UTIL_FLOW : UTIL_SEQ; }

/* ═══════════════════ HELPERS ═══════════════════ */
function getPhase(oi, t) {
  const o = SCHED()[oi];
  if (t >= DONE()[oi]) return { l: "Done", si: 9 };
  if (t < o[0][0]) return { l: "Queue", si: -1 };
  for (let i = 0; i < 8; i++) if (t >= o[i][0] && t < o[i][1]) return { l: STEP_LABELS[i], si: i };
  for (let i = 0; i < 7; i++) if (t >= o[i][1] && t < o[i+1][0]) return { l: "Wait", si: i, wf: i + 1 };
  return { l: "?", si: -1 };
}

function pct(v, maxT) { return (v / maxT * 100) + "%"; }

function getResStatus(res, phases) {
  const map = { Jean: [0,1,2], Jacqueline: [3,6,7], Oven: [4], Rack: [5] };
  for (let oi = 0; oi < 5; oi++) {
    if (phases[oi].si >= 0 && map[res].includes(phases[oi].si))
      return { busy: true, order: oi, step: phases[oi].l };
  }
  return { busy: false };
}

/* ═══════════════════ RENDER ═══════════════════ */
function render() {
  const maxT = M().max;
  const phases = SCHED().map((_, i) => getPhase(i, time));
  const nDone = DONE().filter(d => time >= d).length;
  const nQ = phases.filter(p => p.l === "Queue").length;
  const util = UTIL();
  const gantt = GANTT();

  let html = "";

  // HEADER
  html += `<div style="margin-bottom:12px">
    <div style="font-size:20px;font-weight:700">Pizza Pazza \u2014 Process Simulator</div>
    <div style="font-size:12px;color:#6B7280;margin-top:2px">5 orders of 2 identical pizzas each. Compare one-by-one vs. natural flow.</div>
  </div>`;

  // MODE TOGGLE
  html += `<div style="display:flex;gap:0;margin-bottom:12px;border-radius:8px;overflow:hidden;border:2px solid #E5E7EB;width:fit-content">`;
  html += modeBtn("seq",  "One-by-One", "#DC2626");
  html += modeBtn("flow", "Natural Flow", "#059669");
  html += `</div>`;

  // Mode description
  if (mode === "seq") {
    html += `<div style="background:#FEF2F2;border:1.5px solid #FECACA;border-radius:8px;padding:8px 12px;margin-bottom:12px;font-size:12px;color:#991B1B">
      <strong>One-by-One:</strong> Each order waits for the previous one to fully complete before starting. Total time = 5 \u00D7 30 = <strong>150 min</strong>. Throughput = <strong>2 orders/hr</strong>.
    </div>`;
  } else {
    html += `<div style="background:#F0FDF4;border:1.5px solid #BBF7D0;border-radius:8px;padding:8px 12px;margin-bottom:12px;font-size:12px;color:#166534">
      <strong>Natural Flow:</strong> New orders start as soon as resources are free. Total time = <strong>94 min</strong>. Throughput approaches <strong>3.75 orders/hr</strong>.
      <span style="background:#DCFCE7;border-radius:4px;padding:1px 6px;margin-left:6px;font-weight:700">37% faster!</span>
    </div>`;
  }

  // CONTROLS
  html += `<div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:8px">
    <button onclick="togglePlay()" style="padding:5px 14px;border-radius:6px;border:none;font-size:12px;font-weight:600;color:#fff;background:${playing ? '#DC2626' : '#2563EB'}">${playing ? '\u23F8 Pause' : '\u25B6 Play'}</button>
    <button onclick="resetSim()" style="padding:5px 14px;border-radius:6px;border:none;font-size:12px;font-weight:600;color:#fff;background:#6B7280">\u21BA Reset</button>
    <span style="font-size:11px;color:#9CA3AF;margin-left:8px">Speed</span>`;
  [1, 3, 10].forEach(s => {
    const active = speed === s;
    html += `<button onclick="setSpd(${s})" style="padding:4px 10px;border-radius:5px;border:none;font-size:11px;font-weight:600;color:${active ? '#fff' : '#374151'};background:${active ? '#111827' : '#E5E7EB'}">${s}x</button>`;
  });
  html += `<label style="font-size:11px;color:#6B7280;margin-left:12px;display:flex;gap:4px;align-items:center;cursor:pointer">
    <input type="checkbox" ${showFull ? 'checked' : ''} onchange="toggleFull()"> Full schedule
  </label></div>`;

  // TIME SLIDER
  html += `<div style="display:flex;gap:10px;align-items:center;margin-bottom:16px">
    <span style="font-size:15px;font-weight:700;font-variant-numeric:tabular-nums;min-width:88px">t = ${time.toFixed(1)} min</span>
    <input type="range" min="0" max="${maxT}" step="0.2" value="${time}" oninput="scrub(this.value)" style="flex:1">
    <span style="font-size:12px;font-weight:600;color:#374151">${nDone}/5 done</span>
  </div>`;

  // PROCESS FLOW
  html += `<div style="background:#F9FAFB;border-radius:8px;padding:8px 6px 10px;border:1px solid #E5E7EB;margin-bottom:16px">
    <div style="font-size:10px;font-weight:700;color:#9CA3AF;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px">
      Process Flow${nQ > 0 ? `<span style="color:#D97706;margin-left:6px">${nQ} order${nQ > 1 ? 's' : ''} queued</span>` : ''}
    </div>
    <div style="display:flex;gap:3px;align-items:stretch">`;

  STEP_LABELS.forEach((label, si) => {
    const active = [], waiting = [];
    phases.forEach((ph, oi) => {
      if (ph.si === si) active.push(oi);
      if (ph.wf === si) waiting.push(oi);
    });
    const has = active.length > 0 || waiting.length > 0;
    const isBake = si === 4;
    const isBN = isBake && has;
    html += `<div style="flex:${isBake ? 2 : 1};min-width:0;background:${has ? '#fff' : '#F3F4F6'};border:1.5px solid ${isBN ? '#EF4444' : has ? '#93C5FD' : '#E5E7EB'};border-radius:6px;padding:4px 2px;text-align:center">
      <div style="font-size:9.5px;font-weight:700;color:#374151;line-height:1.1">${label}</div>
      <div style="font-size:8px;color:#9CA3AF;line-height:1.1">${STEP_RES[si]}</div>
      <div style="display:flex;gap:2px;margin-top:4px;justify-content:center;flex-wrap:wrap;min-height:22px">`;
    active.forEach(oi => { html += dot(oi, false); });
    waiting.forEach(oi => { html += dot(oi, true); });
    html += `</div></div>`;
  });

  // Done column
  html += `<div style="flex:.8;min-width:0;background:${nDone > 0 ? '#F0FDF4' : '#F9FAFB'};border:1.5px solid ${nDone > 0 ? '#86EFAC' : '#E5E7EB'};border-radius:6px;padding:4px 2px;text-align:center">
    <div style="font-size:9.5px;font-weight:700;color:#166534;line-height:1.1">Done</div>
    <div style="font-size:8px;color:#9CA3AF">\u2713</div>
    <div style="display:flex;gap:2px;margin-top:4px;justify-content:center;flex-wrap:wrap;min-height:22px">`;
  phases.forEach((ph, oi) => { if (ph.l === "Done") html += dot(oi, false); });
  html += `</div></div></div></div>`;

  // GANTT CHART
  html += `<div style="margin-bottom:14px">
    <div style="font-size:10px;font-weight:700;color:#9CA3AF;margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px">Gantt Chart \u2014 Resource Utilization</div>`;

  RES_NAMES.forEach(res => {
    const status = getResStatus(res, phases);
    const isBN = res === "Oven";
    html += `<div style="display:flex;align-items:center;margin-bottom:2px">
      <div style="width:82px;flex-shrink:0;padding-right:6px;text-align:right">
        <div style="font-size:11px;font-weight:700;color:${isBN ? '#DC2626' : '#374151'};line-height:1.2">${res}</div>
        <div style="font-size:8px;color:${status.busy ? COLORS[status.order] : '#D1D5DB'};line-height:1.1">${status.busy ? `#${status.order + 1} ${status.step}` : 'idle'}</div>
      </div>
      <div style="flex:1;height:30px;background:#F9FAFB;border-radius:4px;position:relative;overflow:hidden;border:1px solid ${isBN ? '#FECACA' : '#E5E7EB'}">`;

    gantt[res].forEach(b => {
      const show = showFull || b.s <= time;
      if (!show) return;
      const visEnd = showFull ? b.e : Math.min(b.e, time);
      const w = visEnd - b.s;
      if (w <= 0) return;
      const op = showFull ? (b.e <= time ? 1 : .3) : (b.e <= time ? .75 : 1);
      html += `<div style="position:absolute;left:${pct(b.s, maxT)};width:${pct(w, maxT)};top:2px;bottom:2px;background:${COLORS[b.o]};border-radius:3px;opacity:${op};display:flex;align-items:center;justify-content:center;overflow:hidden">`;
      if (w / maxT > 0.04) html += `<span style="font-size:9px;color:#fff;font-weight:700">#${b.o + 1}</span>`;
      html += `</div>`;
    });

    // idle-gap hatching in sequential mode
    if (mode === "seq" && showFull) {
      const blocks = gantt[res];
      for (let i = 0; i < blocks.length - 1; i++) {
        const gS = blocks[i].e, gE = blocks[i + 1].s;
        if (gE - gS > 2) {
          html += `<div style="position:absolute;left:${pct(gS, maxT)};width:${pct(gE - gS, maxT)};top:2px;bottom:2px;background:repeating-linear-gradient(45deg,transparent,transparent 3px,rgba(239,68,68,0.08) 3px,rgba(239,68,68,0.08) 6px);border-radius:3px"></div>`;
        }
      }
    }

    // cursor
    html += `<div style="position:absolute;left:${pct(time, maxT)};top:0;bottom:0;width:2px;background:#EF4444;z-index:5;box-shadow:0 0 4px rgba(239,68,68,.5)"></div>`;
    html += `</div>
      <div style="width:42px;flex-shrink:0;text-align:right;padding-left:4px">
        <span style="font-size:9px;font-weight:700;color:${util[res] >= 90 ? '#DC2626' : util[res] >= 50 ? '#D97706' : '#9CA3AF'}">${util[res]}%</span>
      </div>
    </div>`;
  });

  // Time axis
  const tickStep = maxT > 100 ? 20 : 10;
  html += `<div style="display:flex;margin-top:2px">
    <div style="width:82px;flex-shrink:0"></div>
    <div style="flex:1;position:relative;height:20px">`;
  for (let v = 0; v < maxT; v += tickStep) {
    html += `<span style="position:absolute;left:${pct(v, maxT)};font-size:9px;color:#9CA3AF;transform:translateX(-50%);top:2px">${v}</span>`;
  }
  DONE().forEach((d, i) => {
    if (time >= d || showFull) {
      html += `<div style="position:absolute;left:${pct(d, maxT)};top:-2px;transform:translateX(-4px);width:0;height:0;border-left:4px solid transparent;border-right:4px solid transparent;border-top:6px solid ${COLORS[i]};opacity:${time >= d ? 1 : .3}"></div>`;
    }
  });
  html += `</div><div style="width:42px;flex-shrink:0"></div></div>
    <div style="display:flex"><div style="width:82px;flex-shrink:0"></div>
    <div style="flex:1;text-align:center"><span style="font-size:8px;color:#D1D5DB">minutes</span></div>
    <div style="width:42px;flex-shrink:0"></div></div>
  </div>`;

  // COMPLETION LOG
  if (nDone > 0) {
    const done = DONE();
    html += `<div style="background:#F9FAFB;border-radius:6px;padding:7px 10px;border:1px solid #E5E7EB;margin-bottom:14px">
      <div style="font-weight:700;font-size:9px;color:#9CA3AF;margin-bottom:4px;text-transform:uppercase">Completions</div>
      <div style="display:flex;gap:5px;flex-wrap:wrap">`;
    done.forEach((d, i) => {
      if (time >= d) {
        const gap = i > 0 ? d - done[i - 1] : null;
        html += `<span style="display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:4px;background:${COLORS[i]}18;color:${COLORS[i]};font-weight:600;font-size:11px">
          <span style="width:14px;height:14px;border-radius:50%;background:${COLORS[i]};color:#fff;font-size:8px;font-weight:700;display:inline-flex;align-items:center;justify-content:center">${i + 1}</span>
          t=${d}${gap !== null ? `<span style="color:#6B7280;font-weight:400;margin-left:2px">(+${gap})</span>` : ''}
        </span>`;
      }
    });
    html += `</div></div>`;
  }

  // INSIGHTS
  html += `<div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:4px">`;
  if (mode === "seq") {
    if (nDone >= 1) html += insight("#FEF2F2","#FECACA",`Each order takes <strong>30 min</strong> (TFT). Resources sit <strong>idle</strong> between steps.`);
    if (nDone >= 2) html += insight("#FEF2F2","#FECACA",`Gap between completions: <strong>30 min</strong>. Throughput = 60/30 = <strong>2 orders/hr</strong>.`);
    if (nDone >= 3) html += insight("#FFF7ED","#FED7AA",`Oven utilization only <strong>${util.Oven}%</strong> \u2014 it sits empty while the next order is prepped from scratch!`);
    if (nDone >= 5) html += insight("#FEF2F2","#FECACA",`All 5 orders took <strong>150 min</strong>. Can we do better? Switch to <strong>Natural Flow</strong> \u2192`);
  } else {
    if (nDone >= 2) {
      html += insight("#FEF2F2","#FECACA",`Orders complete every <strong>16 min</strong> = oven cycle (1 load + 15 bake)`);
      html += insight("#EFF6FF","#BFDBFE",`Capacity = 60 / 16 = <strong>3.75 orders/hr</strong> = 7.5 pizzas/hr`);
    }
    if (time >= 35 && time < 87) html += insight("#FEF9C3","#FDE68A",`Jean is <strong>idle</strong> since t=35 \u2014 oven still has orders to process`);
    if (time >= 87) html += insight("#F0FDF4","#BBF7D0",`Oven ran <strong>non-stop</strong> from t=8 to t=87 (80 min) \u2014 100% utilized`);
    if (nDone >= 5) html += insight("#F0FDF4","#BBF7D0",`All 5 orders in <strong>94 min</strong> \u2014 <strong>56 min faster</strong> than one-by-one (150 min)!`);
  }
  html += `</div>`;

  // COMPARISON TABLE
  if (nDone >= 2) {
    const isFlow = mode === "flow";
    html += `<div style="margin-top:10px;border-radius:8px;border:1.5px solid #E5E7EB;overflow:hidden;font-size:12px">
      <table style="width:100%;border-collapse:collapse">
        <tr style="background:#F9FAFB">
          <th style="text-align:left;padding:6px 10px;font-weight:700;font-size:11px;color:#6B7280;border-bottom:1px solid #E5E7EB"></th>
          <th style="text-align:center;padding:6px 10px;font-weight:700;font-size:11px;border-bottom:1px solid #E5E7EB;${!isFlow?'color:#DC2626;background:#FEF2F2':'color:#6B7280'}">One-by-One</th>
          <th style="text-align:center;padding:6px 10px;font-weight:700;font-size:11px;border-bottom:1px solid #E5E7EB;${isFlow?'color:#059669;background:#F0FDF4':'color:#6B7280'}">Natural Flow</th>
        </tr>
        <tr><td style="padding:4px 10px;border-bottom:1px solid #F3F4F6;font-weight:600">Total time (5 orders)</td>
            <td style="text-align:center;padding:4px 10px;border-bottom:1px solid #F3F4F6">150 min</td>
            <td style="text-align:center;padding:4px 10px;border-bottom:1px solid #F3F4F6;font-weight:700;color:#059669">94 min</td></tr>
        <tr><td style="padding:4px 10px;border-bottom:1px solid #F3F4F6;font-weight:600">Gap between orders</td>
            <td style="text-align:center;padding:4px 10px;border-bottom:1px solid #F3F4F6">30 min</td>
            <td style="text-align:center;padding:4px 10px;border-bottom:1px solid #F3F4F6;font-weight:700;color:#059669">16 min</td></tr>
        <tr><td style="padding:4px 10px;border-bottom:1px solid #F3F4F6;font-weight:600">Throughput</td>
            <td style="text-align:center;padding:4px 10px;border-bottom:1px solid #F3F4F6">2.0 orders/hr</td>
            <td style="text-align:center;padding:4px 10px;border-bottom:1px solid #F3F4F6;font-weight:700;color:#059669">3.75 orders/hr</td></tr>
        <tr><td style="padding:4px 10px;font-weight:600">Oven utilization</td>
            <td style="text-align:center;padding:4px 10px;color:#DC2626">${UTIL_SEQ.Oven}%</td>
            <td style="text-align:center;padding:4px 10px;font-weight:700;color:#059669">100%</td></tr>
      </table>
    </div>`;
  }

  // LEGEND
  html += `<div style="margin-top:16px;display:flex;gap:12px;align-items:center;flex-wrap:wrap">`;
  for (let i = 0; i < 5; i++) {
    html += `<div style="display:flex;align-items:center;gap:3px">
      <div style="width:14px;height:14px;border-radius:50%;background:${COLORS[i]};display:flex;align-items:center;justify-content:center;font-size:8px;color:#fff;font-weight:700">${i + 1}</div>
      <span style="font-size:10px;color:#6B7280">Order ${i + 1}</span>
    </div>`;
  }
  html += `<div style="display:flex;align-items:center;gap:3px">
    <div style="width:14px;height:14px;border-radius:50%;border:2px dashed #6B7280;background:#fff"></div>
    <span style="font-size:10px;color:#6B7280">Waiting</span>
  </div></div>`;

  document.getElementById("app").innerHTML = html;
}

function insight(bg, border, text) {
  return `<div style="background:${bg};border:1px solid ${border};padding:5px 10px;border-radius:6px;font-size:11px">${text}</div>`;
}

function modeBtn(m, label, color) {
  const active = mode === m;
  return `<button onclick="switchMode('${m}')" style="padding:8px 20px;border:none;font-size:13px;font-weight:700;color:${active?'#fff':'#374151'};background:${active?color:'#fff'};transition:all .15s">${label}</button>`;
}

function dot(oi, waiting) {
  if (waiting) {
    return `<div style="width:20px;height:20px;border-radius:50%;border:2px dashed ${COLORS[oi]};background:#fff;color:${COLORS[oi]};font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0">${oi + 1}</div>`;
  }
  return `<div style="width:20px;height:20px;border-radius:50%;background:${COLORS[oi]};border:2px solid ${COLORS[oi]};color:#fff;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0">${oi + 1}</div>`;
}

/* ═══════════════════ ACTIONS ═══════════════════ */
function switchMode(m) {
  if (m === mode) return;
  mode = m; time = 0; playing = false;
  if (rafId) cancelAnimationFrame(rafId);
  render();
}
function togglePlay() {
  playing = !playing;
  if (playing) startAnim();
  render();
}
function resetSim() { playing = false; time = 0; if (rafId) cancelAnimationFrame(rafId); render(); }
function setSpd(s) { speed = s; render(); }
function toggleFull() { showFull = !showFull; render(); }
function scrub(v) { playing = false; if (rafId) cancelAnimationFrame(rafId); time = parseFloat(v); render(); }

function startAnim() {
  prevStamp = performance.now();
  function tick(now) {
    if (!playing) return;
    const dt = (now - prevStamp) / 1000;
    prevStamp = now;
    time += dt * speed * 2.5;
    if (time >= M().max) { time = M().max; playing = false; }
    render();
    if (playing) rafId = requestAnimationFrame(tick);
  }
  rafId = requestAnimationFrame(tick);
}

render();
</script>
</body>
